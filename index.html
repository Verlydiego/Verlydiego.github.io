<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verly Diego | Home</title>
    <!-- Importando a fonte moderna Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        /* 1. CONFIGURAÇÃO DO FUNDO COM IMAGEM E CENTRALIZAÇÃO */
        body {
            /* SUBSTITUA 'images/background.jpg' PELO NOME DO ARQUIVO DE FUNDO QUE VOCÊ ENVIOU */
            background-image: url('images/uoxrymrrvkm3bpw3.jpg'); 
            background-size: cover;        /* Faz a imagem cobrir toda a tela */
            background-position: center;   /* Centraliza a imagem de fundo */
            background-repeat: no-repeat;  /* Evita que a imagem se repita */
            background-attachment: fixed;  /* Mantém o fundo fixo ao rolar (opcional) */
            background-color: #000000;     /* Fallback: cor preta caso a imagem falhe */
            
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; 
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        /* Adicionando uma camada escura sobre a imagem para destacar o Neon (Opcional) */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); /* Escurece a imagem em 50% */
            z-index: -1;
        }

        /* 2. ESTILO DO BOTÃO CIRCULAR COM NEON AZUL */
        .neon-profile-button {
            display: inline-block;
            text-decoration: none;
            border-radius: 50%; 
            transition: 0.5s ease;
            line-height: 0;
            position: relative;
            z-index: 1;

            filter: brightness(0.9) saturate(0.9);
            
            /* EFEITO NEON AZUL CLARO BORRADO */
            box-shadow: 0 0 20px #00e5ff, 
                        0 0 40px #00e5ff, 
                        0 0 60px #00e5ff;
            
            border: 4px solid #00e5ff; 
        }

        /* 3. EFEITO AO PASSAR O MOUSE (HOVER) */
        .neon-profile-button:hover {
            transform: scale(1.1); 
            box-shadow: 0 0 30px #00e5ff, 
                        0 0 80px #00e5ff, 
                        0 0 120px #00e5ff; 

            filter: brightness(1);
        }

        /* 4. TORNANDO A IMAGEM REDONDA */
        .neon-profile-button img {
            width: 350px;  
            height: 350px; 
            border-radius: 50%; 
            object-fit: cover;  
        }
    </style>
</head>
<body>

    <!-- A IMAGEM-BOTÃO QUE LEVA AO ABOUT.HTML -->
    <a href="https://verlydiego.github.io/about.html" class="neon-profile-button">
        <img src="images/62560979.png" alt="Verly Diego - Clique para acessar">
    </a>

</body>
</html>
