<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação | MJLS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url('images/uoxrymrrvkm3bpw3.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            height: 100vh;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            color: white;
            position: relative;
            padding: 40px 10px; /* Base para todos os cálculos (40px) */
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            z-index: -1;
        }

        .main-container {
            display: flex;
            width: 100%;
            max-width: 1400px; 
            gap: 20px;
            align-items: flex-start;
            justify-content: space-between;
        }

        /* COLUNA ESQUERDA */
        .left-side {
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        .profile-link {
            text-decoration: none;
            transition: 0.5s ease;
            border-radius: 50%;
            line-height: 0;
            display: inline-block;
            margin-bottom: 20px;
            border: 4px solid #00e5ff;
            box-shadow: 0 0 20px #00e5ff;
        }

        .profile-link:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #00e5ff, 0 0 60px #00e5ff, 0 0 90px #00e5ff;
        }

        .profile-img {
            width: 200px; 
            height: 200px; 
            border-radius: 50%;
            object-fit: cover;
        }

        .presentation-box {
            background-color: #ff8c00; 
            color: black;              
            padding: 40px 30px;
            min-height: 350px;       
            width: 320px;            
            border-radius: 20px; 
            margin-top: 40px; /* Começa exatamente aos 308px do topo da página */
            font-weight: bold;
            font-size: 1.1em; 
            text-align: center;
            display: flex;
            align-items: center;
            box-shadow: 0 0 25px #00e5ff, 0 0 50px #00e5ff;
        }

        /* COLUNA DIREITA: AJUSTES DE ALINHAMENTO */
        .right-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            
            /* ALINHAMENTO DE "REPOSITORIES" COM O CENTRO DA IMAGEM */
            padding-top: 60px; 
        }

        .section-header {
            font-family: 'Orbitron', sans-serif;
            color: black;
            font-size: 6em; /* Aumentada ainda mais conforme solicitado */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-shadow: 0 0 15px #ff8c00, 0 0 30px #ff8c00, 0 0 50px #ff8c00;
            text-align: center;
            line-height: 1;
            
            /* MARGEM PARA ALINHAR O TOPO DO BOTÃO COM O TOPO DA CAIXA ESQUERDA (308px) */
            margin-bottom: 120px; 
        }

        .masters-button {
            display: inline-block;
            padding: 25px 80px;
            background-color: #ff8c00;
            color: black;
            text-decoration: none;
            border-radius: 15px;
            font-weight: 900;
            
            /* TAMANHO IGUAL AO DA CAIXA DE APRESENTAÇÃO */
            font-size: 1.1em; 
            
            text-transform: uppercase;
            transition: 0.4s;
            box-shadow: 0 0 15px #00e5ff;
        }

        .masters-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #00e5ff, 0 0 60px #00e5ff;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- LADO ESQUERDO -->
        <div class="left-side">
            <a href="index.html" class="profile-link">
                <img src="images/62560979.png" alt="Home" class="profile-img">
            </a>
            <div class="presentation-box">
                <p>Explore a progressão técnica do projeto MJLS. Este portal oferece acesso direto aos módulos práticos das Classes 1 a 5.</p>
            </div>
        </div>

        <!-- LADO DIREITO -->
        <div class="right-side">
            <div class="section-header">
                Repositories:
            </div>
            
            <!-- BotãoMasters: Alinhado horizontalmente com o início da Presentation Box -->
            <a href="https://verlydiego.github.io/Masters/" class="masters-button">
                Masters
            </a>
        </div>
    </div>

</body>
</html>
