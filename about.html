<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação | MJLS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #000000; 
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            
            /* ALTERAÇÃO: Alinha o conteúdo ao topo em vez de centralizar verticalmente */
            align-items: flex-start; 
            
            min-height: 100vh;
            
            /* Ajuste este valor para definir a distância exata do topo da tela */
            padding: 40px 20px; 
        }

        .main-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 60px;
            align-items: flex-start;
        }

        /* COLUNA ESQUERDA (Imagem + Apresentação) */
        .left-side {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Removemos margens extras para subir a imagem */
            margin-top: 0; 
        }

        .profile-img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #00e5ff;
            box-shadow: 0 0 20px #00e5ff;
            margin-bottom: 25px;
        }

        .presentation-box {
            background-color: #ff8c00; 
            color: black;              
            padding: 60px 40px;        
            min-height: 400px;         
            display: flex;
            align-items: center;       
            justify-content: center;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.3em;
            text-align: center;
            box-shadow: 0 0 30px #00e5ff, 0 0 60px #00e5ff;
        }

        /* COLUNA DIREITA (Trabalho Atual + Botão Masters) */
        .right-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            
            /* ALTERAÇÃO: Reduzi de 150px para 50px para subir a caixa laranja */
            padding-top: 50px; 
        }

        .working-box {
            background-color: #ff8c00; 
            color: black;              
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 25px;
            box-shadow: 0 0 15px #00e5ff, 0 0 30px #00e5ff; 
        }

        .masters-button {
            display: inline-block;
            padding: 20px 50px;
            background-color: #ff8c00;
            color: black;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1.6em;
            transition: 0.4s;
            box-shadow: 0 0 15px #00e5ff;
        }

        .masters-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #00e5ff, 0 0 60px #00e5ff;
        }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; align-items: center; }
            .right-side { padding-top: 20px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- LADO ESQUERDO -->
        <div class="left-side">
            <img src="images/62560979.png" alt="Perfil" class="profile-img">
            <div class="presentation-box">
                <p>Olá! Este espaço é dedicado à apresentação do projeto MJLS Masterclass, focado no desenvolvimento das Classes 1 a 5 [1].</p>
            </div>
        </div>

        <!-- LADO DIREITO -->
        <div class="right-side">
            <div class="working-box">
                no que estou trabalhando:
            </div>
            <!-- Link para o repositório principal com a lista de aulas [1] -->
            <a href="https://verlydiego.github.io/Masters/" class="masters-button">
                Masters
            </a>
        </div>
    </div>

</body>
</html>
