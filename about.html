<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação | MJLS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body {
            /* Fundo com a imagem solicitada anteriormente */
            background-image: url('images/uoxrymrrvkm3bpw3.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000000;
            
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            height: 100vh;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            color: white;
            position: relative;
            
            /* 1. ESPAÇO MÍNIMO NAS BORDAS: Apenas um pequeno respiro de 10px */
            padding: 40px 10px; 
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            z-index: -1;
        }

        .main-container {
            display: flex;
            /* 2. LARGURA TOTAL: Para que a coluna esquerda encoste na borda */
            width: 100%; 
            max-width: 1400px; 
            gap: 20px;
            align-items: flex-start;
        }

        /* COLUNA ESQUERDA: Posicionada bem à esquerda */
        .left-side {
            flex: 1.5; /* Dá mais espaço para o lado da apresentação */
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Alinha os itens à esquerda */
            padding-left: 5px;
        }

        .profile-link {
            text-decoration: none;
            transition: 0.4s ease;
            border-radius: 50%;
            line-height: 0;
            margin-bottom: 20px;
            margin-left: 40px; /* Mantém a foto um pouco mais centralizada na coluna */
        }

        .profile-img {
            width: 220px; 
            height: 220px; 
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #00e5ff;
            box-shadow: 0 0 20px #00e5ff;
        }

        /* 3. CAIXA DE APRESENTAÇÃO COM MAIOR ALTURA E LARGURA */
        .presentation-box {
            background-color: #ff8c00; 
            color: black;              
            padding: 60px 40px;      /* Aumentado o preenchimento interno */
            min-height: 350px;       /* Altura mínima aumentada */
            width: 95%;              /* Quase encosta na borda da coluna */
            border-radius: 0 20px 20px 0; /* Arredonda apenas o lado direito para efeito visual */
            font-weight: bold;
            font-size: 1.2em;
            text-align: left;
            display: flex;
            align-items: center;
            box-shadow: 0 0 25px #00e5ff, 0 0 50px #00e5ff;
        }

        /* COLUNA DIREITA */
        .right-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            
            /* 4. ABAIXANDO O TEXTO REPOSITORIES: Aumentado de 20px para 120px */
            padding-top: 120px; 
        }

        .working-box {
            background-color: #ff8c00; 
            color: black;              
            padding: 10px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 80px; 
            box-shadow: 0 0 15px #00e5ff; 
        }

        .masters-button {
            display: inline-block;
            padding: 20px 50px;
            background-color: #ff8c00;
            color: black;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1.5em;
            transition: 0.4s;
            box-shadow: 0 0 15px #00e5ff;
        }

        .masters-button:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- LADO ESQUERDO: APRESENTAÇÃO MJLS -->
        <div class="left-side">
            <a href="index.html" class="profile-link">
                <img src="images/62560979.png" alt="Home" class="profile-img">
            </a>
            <div class="presentation-box">
                <p>Nesta seção, apresentamos a estrutura técnica do projeto MJLS. O currículo está dividido de forma modular para facilitar o aprendizado prático das Classes 1 a 5 [1].</p>
            </div>
        </div>

        <!-- LADO DIREITO: ACESSO AO REPOSITÓRIO -->
        <div class="right-side">
            <div class="working-box">
                Repositories:
            </div>
            <a href="https://verlydiego.github.io/Masters/" class="masters-button">
                Masters
            </a>
        </div>
    </div>

</body>
</html>
