<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação | MJLS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        /* 1. CONFIGURAÇÃO GERAL */
        body {
            background-color: #000000; /* Fundo preto */
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* CONTAINER PRINCIPAL DIVIDIDO EM DOIS LADOS */
        .main-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 50px;
            align-items: flex-start;
        }

        /* 2. LADO ESQUERDO (Imagem + Caixa de Apresentação) */
        .left-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-img {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #00e5ff; /* Borda Azul Neon */
            box-shadow: 0 0 20px #00e5ff;
            margin-bottom: 20px;
        }

        .presentation-box {
            background-color: #ff8c00; /* Laranja */
            color: black;              /* Letras Pretas */
            padding: 30px;
            border-radius: 15px;
            font-weight: bold;
            text-align: center;
            /* Efeito Neon Azul Borrado no fundo da caixa */
            box-shadow: 0 0 25px #00e5ff, 
                        0 0 50px #00e5ff;
        }

        /* 3. LADO DIREITO (Trabalho Atual + Botão Masters) */
        .right-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding-top: 100px; /* Alinha mais ao centro vertical */
        }

        .working-box {
            background-color: #333;
            color: #00e5ff;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            text-transform: uppercase;
            border: 1px solid #00e5ff;
            margin-bottom: 20px;
            box-shadow: 0 0 10px #00e5ff;
        }

        /* Botão para o repositório Masters */
        .masters-button {
            display: inline-block;
            padding: 20px 40px;
            background-color: #ff8c00; /* Laranja */
            color: black;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1.5em;
            transition: 0.4s;
            box-shadow: 0 0 15px #00e5ff;
        }

        .masters-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #00e5ff, 0 0 60px #00e5ff;
        }

        /* Responsividade para Celulares */
        @media (max-width: 768px) {
            .main-container { flex-direction: column; align-items: center; }
            .right-side { padding-top: 20px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- COLUNA ESQUERDA -->
        <div class="left-side">
            <img src="images/62560979.png" alt="Perfil" class="profile-img">
            <div class="presentation-box">
                <p>Olá! Eu sou o Verly Diego. Esta é a minha Masterclass MJLS, onde compartilho conhecimento técnico e prático através de módulos estruturados.</p>
            </div>
        </div>

        <!-- COLUNA DIREITA -->
        <div class="right-side">
            <div class="working-box">
                no que estou trabalhando:
            </div>
            <!-- Link para o repositório citado na fonte [1] -->
            <a href="https://verlydiego.github.io/Masters/" class="masters-button">
                Masters
            </a>
        </div>
    </div>

</body>
</html>
