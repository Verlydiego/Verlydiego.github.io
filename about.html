<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação | MJLS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #000000; 
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            min-height: 100vh;
            padding: 40px 20px;
        }

        .main-container {
            display: flex;
            width: 100%;
            max-width: 1100px; /* Reduzi um pouco a largura máxima do container */
            gap: 40px;
            align-items: flex-start;
        }

        /* COLUNA ESQUERDA (Imagem + Apresentação) */
        .left-side {
            flex: 1; /* Voltei para proporção igual à direita para reduzir o tamanho */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-img {
            width: 180px; /* Reduzi levemente a imagem para acompanhar a caixa menor */
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #00e5ff;
            box-shadow: 0 0 20px #00e5ff;
            margin-bottom: 20px;
        }

        /* CAIXA DE APRESENTAÇÃO REDUZIDA */
        .presentation-box {
            background-color: #ff8c00; 
            color: black;              
            
            /* REDUÇÃO: Diminuímos o padding e a altura mínima */
            padding: 40px 30px;        
            min-height: 250px;         
            
            display: flex;
            align-items: center;       
            justify-content: center;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1em; /* Fonte levemente menor para caber melhor na caixa reduzida */
            text-align: center;
            box-shadow: 0 0 25px #00e5ff, 0 0 50px #00e5ff;
        }

        /* COLUNA DIREITA */
        .right-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px; 
        }

        .working-box {
            background-color: #ff8c00; 
            color: black;              
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 0.9em;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 20px;
            box-shadow: 0 0 15px #00e5ff; 
        }

        .masters-button {
            display: inline-block;
            padding: 15px 40px;
            background-color: #ff8c00;
            color: black;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1.4em;
            transition: 0.4s;
            box-shadow: 0 0 15px #00e5ff;
        }

        .masters-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #00e5ff, 0 0 60px #00e5ff;
        }

        @media (max-width: 800px) {
            .main-container { flex-direction: column; align-items: center; }
            .right-side { padding-top: 20px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- LADO ESQUERDO -->
        <div class="left-side">
            <img src="images/62560979.png" alt="Perfil" class="profile-img">
            <div class="presentation-box">
                <p>Bem-vindo ao projeto MJLS! Aqui você encontrará o acesso direto às aulas da Masterclass, focadas no desenvolvimento técnico dos módulos 1 a 5 [1].</p>
            </div>
        </div>

        <!-- LADO DIREITO -->
        <div class="right-side">
            <div class="working-box">
                no que estou trabalhando:
            </div>
            <a href="https://verlydiego.github.io/Masters/" class="masters-button">
                Masters
            </a>
        </div>
    </div>

</body>
</html>
