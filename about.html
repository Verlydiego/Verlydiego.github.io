<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação | MJLS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #000000; 
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            min-height: 100vh;
            padding: 40px 20px;
        }

        .main-container {
            display: flex;
            width: 100%;
            max-width: 1100px;
            gap: 40px;
            align-items: flex-start;
        }

        .left-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* NOVO ESTILO PARA O LINK DA IMAGEM */
        .profile-link {
            text-decoration: none;
            transition: 0.4s ease;
            border-radius: 50%;
            line-height: 0;
            display: inline-block;
            margin-bottom: 30px;
        }

        /* EFEITO AO PASSAR O MOUSE NA IMAGEM-BOTÃO */
        .profile-link:hover {
            transform: scale(1.05); /* A imagem cresce levemente ao clicar */
            filter: brightness(1.2); /* Fica um pouco mais clara */
        }

        .profile-img {
            width: 280px; 
            height: 280px; 
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #00e5ff;
            box-shadow: 0 0 25px #00e5ff;
        }

        .presentation-box {
            background-color: #ff8c00; 
            color: black;              
            padding: 40px 30px;        
            min-height: 250px;         
            display: flex;
            align-items: center;       
            justify-content: center;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1em;
            text-align: center;
            box-shadow: 0 0 25px #00e5ff, 0 0 50px #00e5ff;
        }

        .right-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px; 
        }

        .working-box {
            background-color: #ff8c00; 
            color: black;              
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 0.9em;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 20px;
            box-shadow: 0 0 15px #00e5ff; 
        }

        .masters-button {
            display: inline-block;
            padding: 15px 40px;
            background-color: #ff8c00;
            color: black;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1.4em;
            transition: 0.4s;
            box-shadow: 0 0 15px #00e5ff;
        }

        .masters-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #00e5ff, 0 0 60px #00e5ff;
        }

        @media (max-width: 800px) {
            .main-container { flex-direction: column; align-items: center; }
            .profile-img { width: 220px; height: 220px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="left-side">
            <!-- A IMAGEM AGORA É UM LINK QUE VOLTA PARA A HOME (index.html) -->
            <a href="index.html" class="profile-link">
                <img src="images/62560979.png" alt="Voltar para Home" class="profile-img">
            </a>

            <div class="presentation-box">
                <p>Bem-vindo ao projeto MJLS! Explore o conteúdo das aulas Masterclass (Class 1 a 5) clicando no botão ao lado [1].</p>
            </div>
        </div>

        <div class="right-side">
            <div class="working-box">
                no que estou trabalhando:
            </div>
            <a href="https://verlydiego.github.io/Masters/" class="masters-button">
                Masters
            </a>
        </div>
    </div>

</body>
</html>
