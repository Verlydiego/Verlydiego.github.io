<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação | MJLS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url('images/uoxrymrrvkm3bpw3.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            height: 100vh;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            color: white;
            position: relative;
            padding: 40px 10px; 
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            z-index: -1;
        }

        .main-container {
            display: flex;
            width: 100%;
            max-width: 1400px; 
            gap: 20px;
            align-items: flex-start;
            justify-content: space-between;
        }

        /* COLUNA ESQUERDA: Agora com alinhamento centralizado para a imagem e caixa */
        .left-side {
            display: flex;
            flex-direction: column;
            align-items: center; /* Garante a imagem no centro da largura da caixa */
            padding: 0;
            margin: 0;
        }

        .profile-link {
            text-decoration: none;
            transition: 0.4s ease;
            border-radius: 50%;
            line-height: 0;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 200px; 
            height: 200px; 
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #00e5ff;
            box-shadow: 0 0 20px #00e5ff;
        }

        /* CAIXA DE APRESENTAÇÃO: Bordas arredondadas e largura ajustada */
        .presentation-box {
            background-color: #ff8c00; 
            color: black;              
            padding: 40px 30px;
            min-height: 350px;       
            width: 320px;            
            
            /* Bordas arredondadas em todos os lados para não ficar quadrada à esquerda */
            border-radius: 20px; 
            
            font-weight: bold;
            font-size: 1.1em;
            text-align: center; /* Texto centralizado para harmonizar com o layout */
            display: flex;
            align-items: center;
            box-shadow: 0 0 25px #00e5ff, 0 0 50px #00e5ff;
        }

        /* COLUNA DIREITA */
        .right-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            
            /* ALINHAMENTO: "Repositories" na linha do centro da imagem (200px imagem / 2 = 100px) */
            padding-top: 80px; 
        }

        .working-box {
            background-color: #ff8c00; 
            color: black;              
            padding: 10px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 900;
            text-transform: uppercase;
            
            /* Espaçamento para o botão Masters abaixo */
            margin-bottom: 120px; 
            
            box-shadow: 0 0 15px #00e5ff; 
        }

        .masters-button {
            display: inline-block;
            padding: 20px 50px;
            background-color: #ff8c00;
            color: black;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1.5em;
            transition: 0.4s;
            box-shadow: 0 0 15px #00e5ff;
        }

        .masters-button:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- LADO ESQUERDO: IMAGEM NO CENTRO DA CAIXA -->
        <div class="left-side">
            <a href="index.html" class="profile-link">
                <img src="images/62560979.png" alt="Home" class="profile-img">
            </a>
            <div class="presentation-box">
                <p>Nesta seção, exploramos o currículo técnico MJLS. Acesse os módulos das Classes 1 a 5 através do nosso repositório principal [1].</p>
            </div>
        </div>

        <!-- LADO DIREITO: REPOSITORIES ALINHADO AO CENTRO DA IMAGEM -->
        <div class="right-side">
            <div class="working-box">
                Repositories:
            </div>
            <a href="https://verlydiego.github.io/Masters/" class="masters-button">
                Masters
            </a>
        </div>
    </div>

</body>
</html>
