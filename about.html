<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentação | MJLS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url('images/uoxrymrrvkm3bpw3.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            height: 100vh;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            color: white;
            position: relative;
            padding: 40px 10px; 
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); 
            z-index: -1;
        }

        .main-container {
            display: flex;
            width: 100%;
            max-width: 1400px; 
            gap: 20px;
            align-items: flex-start;
            justify-content: space-between;
        }

        .left-side {
            display: flex;
            flex-direction: column;
            align-items: center; 
            padding: 0;
            margin: 0;
        }

        /* 1. ESTILO DO BOTÃO NA IMAGEM (RESTAURADO E AMPLIADO) */
        .profile-link {
            text-decoration: none;
            transition: 0.5s ease; /* Transição suave para o brilho e escala */
            border-radius: 50%;
            line-height: 0;
            display: inline-block;
            margin-bottom: 20px;
            border: 4px solid #00e5ff;
            box-shadow: 0 0 20px #00e5ff;
        }

        /* EFEITO HOVER: CRESCE E BRILHA MAIS */
        .profile-link:hover {
            transform: scale(1.1); /* Cresce levemente */
            box-shadow: 0 0 30px #00e5ff, 
                        0 0 60px #00e5ff, 
                        0 0 90px #00e5ff; /* Intensifica o brilho azul */
        }

        .profile-img {
            width: 200px; 
            height: 200px; 
            border-radius: 50%;
            object-fit: cover;
        }

        /* 2. CAIXA DE APRESENTAÇÃO (MAIS BAIXA E COM BORDAS SUAVES) */
        .presentation-box {
            background-color: #ff8c00; 
            color: black;              
            padding: 40px 30px;
            min-height: 350px;       
            width: 320px;            
            border-radius: 20px; 
            
            /* AJUSTE: Desce a caixa em relação à imagem */
            margin-top: 40px; 
            
            font-weight: bold;
            font-size: 1.1em;
            text-align: center;
            display: flex;
            align-items: center;
            box-shadow: 0 0 25px #00e5ff, 0 0 50px #00e5ff;
        }

        .right-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Alinhado ao centro da imagem (80px de padding + 100px de metade da imagem) */
            padding-top: 80px; 
        }

        .working-box {
            background-color: #ff8c00; 
            color: black;              
            padding: 10px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 120px; 
            box-shadow: 0 0 15px #00e5ff; 
        }

        .masters-button {
            display: inline-block;
            padding: 20px 50px;
            background-color: #ff8c00;
            color: black;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1.5em;
            transition: 0.4s;
            box-shadow: 0 0 15px #00e5ff;
        }

        .masters-button:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- COLUNA ESQUERDA -->
        <div class="left-side">
            <a href="index.html" class="profile-link">
                <img src="images/62560979.png" alt="Voltar para Home" class="profile-img">
            </a>
            <div class="presentation-box">
                <p>O projeto MJLS foi estruturado para guiar seu aprendizado de forma progressiva. Explore o conteúdo detalhado das aulas Class 1 até a Class 5 através do link Masters.</p>
            </div>
        </div>

        <!-- COLUNA DIREITA -->
        <div class="right-side">
            <div class="working-box">
                Repositories:
            </div>
            <a href="https://verlydiego.github.io/Masters/" class="masters-button">
                Masters
            </a>
        </div>
    </div>

</body>
</html>
